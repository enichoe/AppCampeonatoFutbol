<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primario SEO -->
    <title>Fútbol App | Organiza tu Campeonato de Fútbol en Perú</title>
    <meta name="description" content="Deja el desorden y organiza tu torneo de fútbol con Fútbol App. Fixtures automáticos, tablas de posiciones en tiempo real y resultados por WhatsApp. ¡Crea tu liga hoy!">
    <meta name="keywords" content="torneos de fútbol Perú, organizar campeonato de fútbol, fixture automático, tabla de posiciones fútbol, liga de fútbol 7, pichangas ordenadas, app fútbol amateur">
    <meta name="author" content="Fútbol App">
    <meta name="robots" content="index, follow">

    <!-- SEO Local Perú -->
    <meta name="geo.region" content="PE-LIM">
    <meta name="geo.placename" content="Lima">

    <!-- Open Graph / WhatsApp -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://futbolapp.site/">
    <meta property="og:title" content="⚽ Fútbol App | Organiza tu Torneo en Minutos">
    <meta property="og:description" content="La solución definitiva para ligas y campeonatos en Perú. Fixture automático y tablas de posiciones GRATIS.">
    <meta property="og:image" content="https://futbolapp.site/img1.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Fútbol App | Gestión de Campeonatos en Perú">
    <meta property="twitter:description" content="Crea tu torneo, genera el fixture y comparte la tabla por WhatsApp.">
    <meta property="twitter:image" content="https://futbolapp.site/img1.png">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    
    <link rel="stylesheet" href="/src/style.css">
    
    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Fútbol App",
      "operatingSystem": "Web",
      "applicationCategory": "SportsApplication",
      "description": "Plataforma de gestión de torneos de fútbol en Perú. Automatiza fixtures y tablas de posiciones.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "PEN"
      }
    }
    </script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans selection:bg-indigo-500/30 overflow-x-hidden">

    <script>
        // Ocultar preventivamente si no es la home para evitar parpadeo
        if (window.location.pathname !== '/' && window.location.pathname !== '/index.html') {
            document.write('<style>#app { visibility: hidden; opacity: 0; }</style>');
        }
    </script>

    <!-- Contenedor Principal (Sustituido por JS) -->
    <div id="app"></div>

    <!-- Script de Inicialización -->
    <script type="module" src="/src/main.js"></script>
    
</body>
</html>
